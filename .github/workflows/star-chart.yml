name: Star chart

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  # Smoke test: on PRs that touch the action, run it without committing and
  # upload the rendered SVGs as an artifact.
  pull_request:
    paths:
      - "action.yml"
      - "packages/action/**"

permissions:
  contents: write

jobs:
  star-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render star chart
        id: chart
        uses: ./
        with:
          theme: violet
          commit: ${{ github.event_name != 'pull_request' }}

      - name: Job summary
        env:
          STARS: ${{ steps.chart.outputs.stars }}
          SNIPPET: ${{ steps.chart.outputs.snippet }}
        run: |
          {
            echo "### shieldcn starchart"
            echo ""
            echo "Stars: **$STARS**"
            echo ""
            echo '```html'
            printf '%s\n' "$SNIPPET"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload chart artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: star-chart
          path: .github/shieldcn/*.svg
